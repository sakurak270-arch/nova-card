<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kei Yoke | Konibet</title>
  <meta name="description" content="Kei Yoke - Affiliate Manager at Konibet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #1688ff;
      --blue-2: #52b7ff;
      --navy: #061e3f;
      --ink: #10233f;
      --muted: #5f7189;
      --line: rgba(22, 136, 255, 0.22);
      --white: #ffffff;
      --shadow: 0 28px 78px rgba(6, 30, 63, 0.2);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Montserrat", "Aptos", "Segoe UI", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 8%, rgba(82, 183, 255, 0.22), transparent 30%),
        linear-gradient(145deg, #ffffff 0%, #edf8ff 45%, #d8efff 100%);
    }

    body {
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .card {
      position: relative;
      width: min(100%, 440px);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.84);
      border-radius: 30px;
      background: var(--white);
      box-shadow: var(--shadow);
    }

    .hero {
      position: relative;
      min-height: 322px;
      padding: 30px 28px 34px;
      background:
        radial-gradient(circle at 0% 100%, rgba(22, 136, 255, 0.14), transparent 34%),
        linear-gradient(112deg, #ffffff 0%, #ffffff 56%, var(--navy) 56.3%, #021226 100%);
    }

    .hero::before {
      position: absolute;
      right: 106px;
      top: -34px;
      width: 14px;
      height: 350px;
      border-radius: 999px;
      background: linear-gradient(180deg, transparent, var(--blue), var(--blue-2), transparent);
      box-shadow: 0 0 24px rgba(22, 136, 255, 0.54);
      transform: rotate(23deg);
      content: "";
    }

    .hero::after {
      position: absolute;
      left: -70px;
      bottom: -102px;
      width: 230px;
      height: 230px;
      border: 1px solid rgba(22, 136, 255, 0.24);
      border-radius: 50%;
      box-shadow:
        12px 12px 0 -11px rgba(22, 136, 255, 0.3),
        24px 24px 0 -22px rgba(22, 136, 255, 0.22);
      content: "";
    }

    .logo {
      position: relative;
      z-index: 1;
      display: block;
      width: 210px;
      max-width: 72%;
      height: auto;
      margin-bottom: 48px;
    }

    h1 {
      position: relative;
      z-index: 1;
      margin: 0;
      max-width: 330px;
      color: var(--navy);
      font-size: clamp(48px, 15vw, 74px);
      font-weight: 900;
      line-height: 0.92;
      letter-spacing: 0;
    }

    h1 span {
      color: var(--blue);
    }

    .name-line {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0 0;
    }

    .name-line::before {
      width: 100px;
      height: 5px;
      border-radius: 999px;
      background: var(--blue);
      box-shadow: 0 0 16px rgba(22, 136, 255, 0.28);
      content: "";
    }

    .name-line::after {
      width: 160px;
      height: 1px;
      background: rgba(6, 30, 63, 0.2);
      content: "";
    }

    .details {
      position: relative;
      display: grid;
      gap: 12px;
      padding: 24px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(247, 252, 255, 0.96));
    }

    .role {
      margin: 0;
      color: var(--blue);
      font-size: 22px;
      font-weight: 700;
      line-height: 1.28;
    }

    .brand-copy {
      margin: 10px 0 8px;
      color: var(--ink);
      font-size: 15px;
      font-weight: 500;
      line-height: 1.55;
    }

    .brand-copy strong {
      display: block;
      color: var(--blue);
      font-size: 18px;
      font-weight: 800;
    }

    .actions {
      display: grid;
      gap: 12px;
      margin-top: 10px;
    }

    .action {
      position: relative;
      display: flex;
      align-items: center;
      gap: 14px;
      min-height: 64px;
      padding: 13px 16px;
      overflow: hidden;
      border: 1px solid rgba(22, 136, 255, 0.18);
      border-radius: 18px;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.98), rgba(241, 249, 255, 0.92)),
        var(--white);
      color: var(--ink);
      text-decoration: none;
      box-shadow: 0 14px 34px rgba(6, 30, 63, 0.08);
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .action::after {
      position: absolute;
      right: 16px;
      bottom: 0;
      width: 56px;
      height: 4px;
      border-radius: 999px 999px 0 0;
      background: linear-gradient(90deg, transparent, var(--blue), var(--blue-2));
      box-shadow: 0 0 16px rgba(22, 136, 255, 0.42);
      content: "";
    }

    .action:hover,
    .action:focus-visible {
      transform: translateY(-2px);
      border-color: rgba(22, 136, 255, 0.4);
      box-shadow: 0 18px 40px rgba(22, 136, 255, 0.16);
      outline: none;
    }

    .icon {
      display: grid;
      width: 46px;
      height: 46px;
      flex: 0 0 auto;
      place-items: center;
      border: 1px solid rgba(22, 136, 255, 0.38);
      border-radius: 50%;
      color: var(--blue);
      background:
        radial-gradient(circle at 32% 24%, rgba(255, 255, 255, 0.58), transparent 32%),
        rgba(22, 136, 255, 0.08);
      box-shadow: 0 0 24px rgba(22, 136, 255, 0.18);
    }

    .icon svg {
      display: block;
      width: 22px;
      height: 22px;
      fill: currentColor;
      stroke: currentColor;
      stroke-width: 2.35;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .icon svg.fill-only {
      stroke: none;
    }

    .label {
      display: block;
      color: var(--blue);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      line-height: 1.35;
      text-transform: uppercase;
    }

    .value {
      display: block;
      color: var(--ink);
      font-size: 15px;
      font-weight: 700;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    @media (min-width: 780px) {
      .card {
        width: min(100%, 980px);
        min-height: 560px;
        display: grid;
        grid-template-columns: 48% 52%;
      }

      .hero {
        min-height: 560px;
        padding: 46px 42px;
      }

      .logo {
        width: 250px;
        margin-bottom: 84px;
      }

      .details {
        align-content: center;
        padding: 44px 42px 44px 76px;
        color: var(--white);
        background:
          linear-gradient(145deg, var(--navy), #021226 78%);
      }

      .details::before {
        position: absolute;
        left: -84px;
        top: -40px;
        width: 160px;
        height: calc(100% + 80px);
        border-left: 8px solid var(--blue);
        border-radius: 70px;
        background: var(--navy);
        transform: skewX(-18deg);
        content: "";
      }

      .role,
      .brand-copy,
      .brand-copy strong {
        position: relative;
        z-index: 1;
      }

      .brand-copy {
        color: rgba(255, 255, 255, 0.86);
      }

      .action {
        position: relative;
        z-index: 1;
        border-color: rgba(22, 136, 255, 0.26);
        background: rgba(255, 255, 255, 0.04);
        color: var(--white);
      }

      .value {
        color: var(--white);
      }
    }

    @media (max-width: 360px) {
      body {
        padding: 10px;
      }

      .hero,
      .details {
        padding-right: 18px;
        padding-left: 18px;
      }

      .logo {
        margin-bottom: 40px;
      }

      h1 {
        font-size: clamp(42px, 14vw, 58px);
      }
    }
  </style>
</head>
<body>
  <main class="card" aria-label="Kei Yoke digital business card">
    <section class="hero">
      <img class="logo" src="../Konibet_LOGO.png" alt="konibet">
      <h1>Kei <span>Yoke</span></h1>
      <div class="name-line" aria-hidden="true"></div>
    </section>

    <section class="details">
      <p class="role">Affiliate Manager</p>
      <p class="brand-copy">
        <strong>Konibet</strong>
        Global Entertainment<br>
        Boundless Opportunities
      </p>

      <div class="actions">
        <a class="action" href="mailto:k.seki@konibet.com">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <rect x="3.5" y="5" width="17" height="14" rx="3"></rect>
              <path d="m5 7 7 6 7-6"></path>
            </svg>
          </span>
          <span>
            <span class="label">Mail</span>
            <span class="value">k.seki@konibet.com</span>
          </span>
        </a>

        <a class="action" href="https://t.me/THISISKEI7">
          <span class="icon" aria-hidden="true">
            <svg class="fill-only" viewBox="0 0 24 24">
              <path d="M21.7 4.2 18.5 19c-.2 1-.8 1.2-1.6.8l-4.7-3.5-2.3 2.2c-.3.3-.5.5-1 .5l.3-4.8 8.8-7.9c.4-.3-.1-.5-.6-.2L6.6 13 2 11.5c-1-.3-1-1 .2-1.4L20.1 3.2c.8-.3 1.6.2 1.6 1Z"></path>
            </svg>
          </span>
          <span>
            <span class="label">Telegram</span>
            <span class="value">@THISISKEI7</span>
          </span>
        </a>

        <a class="action" href="https://konibet.com/">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="9"></circle>
              <path d="M3.5 12h17"></path>
              <path d="M12 3c2.4 2.5 3.6 5.5 3.6 9S14.4 18.5 12 21c-2.4-2.5-3.6-5.5-3.6-9S9.6 5.5 12 3Z"></path>
            </svg>
          </span>
          <span>
            <span class="label">Website</span>
            <span class="value">https://konibet.com/</span>
          </span>
        </a>
      </div>
    </section>
  </main>
</body>
</html>
