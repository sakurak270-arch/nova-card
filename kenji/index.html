<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KENJI STERLING | Sales Strategist</title>
  <meta name="description" content="KENJI STERLING - Sales Strategist">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #050507;
      --panel: #0b0d12;
      --pink: #e13b8f;
      --pink-2: #ff6fbd;
      --white: #ffffff;
      --soft: #f6f6f8;
      --muted: #9ba1ad;
      --line: rgba(225, 59, 143, 0.42);
      --shadow: 0 28px 78px rgba(0, 0, 0, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Montserrat", "Aptos", "Segoe UI", Arial, sans-serif;
      color: var(--white);
      background:
        radial-gradient(circle at 10% 8%, rgba(225, 59, 143, 0.18), transparent 28%),
        linear-gradient(145deg, #11131a 0%, #030405 58%, #101219 100%);
    }

    body {
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .card {
      position: relative;
      width: min(100%, 440px);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 28px;
      background: linear-gradient(140deg, var(--black) 0%, var(--panel) 48%, #ffffff 48.4%, #ffffff 100%);
      box-shadow: var(--shadow);
    }

    .card::before {
      position: absolute;
      top: -22px;
      right: 135px;
      width: 4px;
      height: 690px;
      background: linear-gradient(180deg, transparent, var(--pink), var(--pink-2), transparent);
      box-shadow: 0 0 18px rgba(225, 59, 143, 0.6);
      transform: rotate(15deg);
      content: "";
    }

    .left {
      position: relative;
      z-index: 1;
      padding: 32px 28px 26px;
      min-height: 350px;
    }

    .brand {
      display: flex;
      align-items: center;
      margin-bottom: 52px;
    }

    .brand-logo {
      display: block;
      width: 198px;
      max-width: 76%;
      height: auto;
      filter: drop-shadow(0 12px 26px rgba(225, 59, 143, 0.24));
    }

    h1 {
      margin: 0;
      font-size: clamp(46px, 13vw, 70px);
      font-weight: 400;
      line-height: 0.92;
      letter-spacing: 0.08em;
    }

    h1 span {
      display: block;
      color: var(--pink);
    }

    .role {
      margin: 28px 0 0;
      color: rgba(255, 255, 255, 0.92);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.38em;
      text-transform: uppercase;
    }

    .tagline {
      margin: 8px 0 30px;
      color: var(--pink-2);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .accent {
      width: 98px;
      height: 2px;
      margin-bottom: 28px;
      border-radius: 999px;
      background: var(--pink);
      box-shadow: 0 0 18px rgba(225, 59, 143, 0.8);
    }

    .contact-list {
      display: grid;
      gap: 14px;
      width: min(100%, 310px);
    }

    .contact {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      min-height: 50px;
      padding: 4px 12px 4px 0;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(5, 5, 7, 0.82), rgba(5, 5, 7, 0.42), transparent);
      color: var(--white);
      text-decoration: none;
    }

    .contact-icon {
      display: grid;
      width: 42px;
      height: 42px;
      place-items: center;
      border: 1px solid rgba(225, 59, 143, 0.42);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.04);
      box-shadow: 0 0 22px rgba(225, 59, 143, 0.22);
    }

    .contact-icon svg {
      width: 20px;
      height: 20px;
      color: var(--pink);
      fill: var(--pink);
      stroke: var(--pink);
      stroke-width: 2.4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .contact-icon svg.fill-only {
      stroke: none;
    }

    .contact strong {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.02em;
      overflow-wrap: anywhere;
      line-height: 1.25;
    }

    .contact.email strong {
      max-width: 225px;
      font-size: 12px;
    }

    .right {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 16px;
      padding: 22px 24px 28px;
      color: #12141a;
    }

    .media {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 86px;
      padding: 14px 18px;
      border: 1px solid rgba(225, 59, 143, 0.14);
      border-radius: 18px;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.96), rgba(250, 248, 252, 0.96)),
        var(--white);
      color: #101216;
      text-decoration: none;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.06);
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }

    .media:hover,
    .media:focus-visible {
      transform: translateY(-2px);
      border-color: rgba(225, 59, 143, 0.38);
      box-shadow: 0 18px 42px rgba(225, 59, 143, 0.16);
      outline: none;
    }

    .media-logo {
      display: block;
      width: min(100%, 280px);
      max-height: 68px;
      object-fit: contain;
    }

    .media-logo.ocr {
      max-height: 58px;
    }

    .media-logo.tengoku {
      max-height: 70px;
    }

    .media-logo.japan {
      max-height: 62px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (min-width: 760px) {
      .card {
        width: min(100%, 920px);
        min-height: 560px;
        display: grid;
        grid-template-columns: 47% 53%;
      }

      .left {
        padding: 42px 38px 34px;
      }

      .right {
        align-content: center;
        padding: 36px 38px 36px 72px;
      }
    }

    @media (max-width: 430px) {
      body {
        padding: 10px;
      }

      .card {
        border-radius: 24px;
      }

      .left {
        padding: 28px 24px 24px;
      }

      h1 {
        font-size: clamp(42px, 13vw, 58px);
      }

      .role {
        letter-spacing: 0.24em;
      }

      .tagline,
      .closing {
        letter-spacing: 0.14em;
      }

      .right {
        padding: 20px;
      }

      .media {
        min-height: 78px;
      }

      .media-logo {
        max-height: 58px;
      }
    }
  </style>
</head>

  </main>
</body>
</html>
