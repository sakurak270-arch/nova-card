<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nova | Konibet</title>
  <meta name="description" content="Nova - Marketing Manager / Operations Manager">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #1688ff;
      --blue-2: #51b7ff;
      --navy: #061e3f;
      --ink: #10233f;
      --muted: #5f7189;
      --line: rgba(22, 136, 255, 0.18);
      --white: #ffffff;
      --soft: #eef8ff;
      --shadow: 0 26px 70px rgba(6, 30, 63, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Montserrat", "Aptos", "Segoe UI Variable", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 8%, rgba(81, 183, 255, 0.24), transparent 34%),
        radial-gradient(circle at 88% 24%, rgba(22, 136, 255, 0.16), transparent 32%),
        linear-gradient(145deg, #ffffff 0%, #eef8ff 46%, #d8efff 100%);
    }

    body {
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .card {
      width: min(100%, 430px);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.82);
      border-radius: 30px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(248, 253, 255, 0.94)),
        rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow);
    }

    .top {
      position: relative;
      min-height: 184px;
      padding: 26px 26px 20px;
      background:
        radial-gradient(circle at 84% 20%, rgba(255, 255, 255, 0.24), transparent 30%),
        linear-gradient(135deg, rgba(8, 31, 67, 0.95), rgba(22, 136, 255, 0.96) 45%, rgba(81, 183, 255, 0.88)),
        #1688ff;
      color: var(--white);
    }

    .top::after {
      position: absolute;
      right: -58px;
      bottom: -92px;
      width: 210px;
      height: 210px;
      border: 28px solid rgba(255, 255, 255, 0.23);
      border-radius: 50%;
      content: "";
    }

    .top::before {
      position: absolute;
      right: -26px;
      bottom: -2px;
      width: 230px;
      height: 78px;
      border-top: 3px solid rgba(255, 255, 255, 0.44);
      border-radius: 100% 0 0 0;
      transform: rotate(-10deg);
      content: "";
    }

    .logo-wrap {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      width: 190px;
      max-width: 76%;
      min-height: 42px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 16px 36px rgba(6, 30, 63, 0.18);
    }

    .logo {
      display: block;
      width: 100%;
      height: auto;
    }

    .identity {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      margin-top: 30px;
    }

    h1 {
      margin: 0;
      font-size: clamp(40px, 12vw, 58px);
      font-weight: 900;
      line-height: 0.92;
      letter-spacing: 0;
      text-shadow: 0 12px 32px rgba(6, 30, 63, 0.22);
    }

    .mascot {
      position: relative;
      display: grid;
      width: 90px;
      height: 90px;
      flex: 0 0 auto;
      place-items: center;
      border: 2px solid rgba(255, 255, 255, 0.72);
      border-radius: 50%;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.12)),
        rgba(255, 255, 255, 0.16);
      overflow: hidden;
      box-shadow:
        0 18px 36px rgba(6, 30, 63, 0.24),
        inset 0 0 18px rgba(255, 255, 255, 0.22);
    }

    .mascot img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .content {
      position: relative;
      padding: 24px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(248, 253, 255, 0.96));
    }

    .role {
      position: relative;
      display: grid;
      gap: 8px;
      margin: -4px 0 24px;
      padding: 18px 18px 16px 22px;
      overflow: hidden;
      border: 1px solid rgba(22, 136, 255, 0.24);
      border-radius: 18px;
      background:
        radial-gradient(circle at 96% 4%, rgba(81, 183, 255, 0.18), transparent 30%),
        linear-gradient(90deg, rgba(22, 136, 255, 0.13), rgba(255, 255, 255, 0) 62%),
        #ffffff;
      box-shadow:
        0 18px 38px rgba(6, 30, 63, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.92);
    }

    .role::before {
      position: absolute;
      top: 18px;
      bottom: 18px;
      left: 0;
      width: 5px;
      border-radius: 0 999px 999px 0;
      background: linear-gradient(180deg, var(--blue), var(--blue-2));
      content: "";
    }

    .role::after {
      position: absolute;
      right: 16px;
      bottom: 13px;
      width: 54px;
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, var(--blue), var(--blue-2));
      box-shadow: 0 0 14px rgba(22, 136, 255, 0.38);
      content: "";
    }

    .role span {
      display: block;
      color: var(--navy);
      font-size: 17px;
      font-weight: 800;
      letter-spacing: 0;
      line-height: 1.18;
      overflow-wrap: anywhere;
    }

    .role span + span {
      color: var(--blue);
    }

    .actions {
      display: grid;
      gap: 12px;
    }

    .action {
      position: relative;
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 58px;
      padding: 13px 15px;
      overflow: hidden;
      border: 1px solid rgba(22, 136, 255, 0.17);
      border-radius: 18px;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.98), rgba(242, 250, 255, 0.92)),
        #ffffff;
      text-decoration: none;
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .action::after {
      position: absolute;
      right: 14px;
      bottom: 0;
      width: 52px;
      height: 3px;
      border-radius: 999px 999px 0 0;
      background: linear-gradient(90deg, transparent, rgba(22, 136, 255, 0.84));
      content: "";
    }

    .action:hover,
    .action:focus-visible {
      transform: translateY(-1px);
      border-color: rgba(22, 136, 255, 0.38);
      box-shadow: 0 14px 32px rgba(22, 136, 255, 0.16);
      outline: none;
    }

    .icon {
      display: grid;
      width: 34px;
      height: 34px;
      flex: 0 0 auto;
      place-items: center;
      border-radius: 50%;
      color: var(--white);
      background:
        radial-gradient(circle at 32% 26%, rgba(255, 255, 255, 0.34), transparent 30%),
        linear-gradient(135deg, var(--blue), var(--blue-2));
      font-size: 17px;
      font-weight: 800;
      box-shadow: 0 10px 22px rgba(22, 136, 255, 0.26);
    }

    .icon svg {
      width: 18px;
      height: 18px;
      display: block;
      fill: currentColor;
      stroke: currentColor;
      stroke-width: 2.4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .icon svg.fill-only {
      stroke: none;
    }

    .text {
      min-width: 0;
    }

    .label {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      line-height: 1.35;
    }

    .value {
      display: block;
      overflow-wrap: anywhere;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.35;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 20px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .mark {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--blue);
      box-shadow: 14px 0 0 var(--blue-2), 28px 0 0 #83d1ff;
    }

    @media (max-width: 360px) {
      body {
        padding: 10px;
      }

      .card {
        border-radius: 22px;
      }

      .top,
      .content {
        padding-right: 18px;
        padding-left: 18px;
      }

      .identity {
        align-items: center;
      }

      .mascot {
        width: 70px;
        height: 70px;
      }

      .role {
        padding-right: 16px;
        padding-left: 18px;
      }

      .role span {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <main class="card" aria-label="Nova digital business card">
    <section class="top">
      <div class="logo-wrap">
        <img class="logo" src="Konibet_LOGO.png" alt="konibet">
      </div>
      <div class="identity">
        <h1>Nova</h1>
        <div class="mascot" aria-label="Koni character">
          <img src="koni-character.png" alt="">
        </div>
      </div>
    </section>

    <section class="content">
      <p class="role">
        <span>Marketing Manager</span>
        <span>Operations Manager</span>
      </p>

      <div class="actions">
        <a class="action" href="mailto:Kobayashi@konibet.com">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <rect x="3.5" y="5" width="17" height="14" rx="3"></rect>
              <path d="m5 7 7 6 7-6"></path>
            </svg>
          </span>
          <span class="text">
            <span class="label">Email</span>
            <span class="value">Kobayashi@konibet.com</span>
          </span>
        </a>

        <a class="action" href="https://t.me/ACCHAN777">
          <span class="icon" aria-hidden="true">
            <svg class="fill-only" viewBox="0 0 24 24">
              <path d="M21.7 4.2 18.5 19c-.2 1-.8 1.2-1.6.8l-4.7-3.5-2.3 2.2c-.3.3-.5.5-1 .5l.3-4.8 8.8-7.9c.4-.3-.1-.5-.6-.2L6.6 13 2 11.5c-1-.3-1-1 .2-1.4L20.1 3.2c.8-.3 1.6.2 1.6 1Z"></path>
            </svg>
          </span>
          <span class="text">
            <span class="label">Telegram</span>
            <span class="value">@ACCHAN777</span>
          </span>
        </a>

        <a class="action" href="https://konibet.com/">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="9"></circle>
              <path d="M3.5 12h17"></path>
              <path d="M12 3c2.4 2.5 3.6 5.5 3.6 9S14.4 18.5 12 21c-2.4-2.5-3.6-5.5-3.6-9S9.6 5.5 12 3Z"></path>
            </svg>
          </span>
          <span class="text">
            <span class="label">Website</span>
            <span class="value">konibet.com</span>
          </span>
        </a>
      </div>

      <div class="footer">
        <span>konibet digital card</span>
        <span class="mark" aria-hidden="true"></span>
      </div>
    </section>
  </main>

</body>
</html>
